<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b12">
<title>주식 AI 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070b12; --surface:#0d1421; --surface2:#111c2e;
  --border:#1a2840; --border2:#243553;
  --text:#dce8f5; --text2:#6b87aa; --text3:#3d5472;
  --up:#00e676; --down:#ff5252; --blue:#4a9eff; --gold:#ffc947;
  --warn:#ff9800; --mono:'JetBrains Mono',monospace;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;transition:all 0.3s;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#0d2040,var(--bg) 65%);}
.auth-box{width:360px;max-width:92vw;padding:48px 36px;background:var(--surface);border:1px solid var(--border);border-radius:24px;}
.auth-logo{font-size:32px;font-weight:900;letter-spacing:-1.5px;margin-bottom:4px;background:linear-gradient(135deg,#4a9eff,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:28px;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--text3);border-radius:8px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
.auth-tab.active{background:var(--surface2);color:var(--blue);}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:1px;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--blue);}
.form-input::placeholder{color:var(--text3);}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#1a5eff,#4a9eff);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity 0.2s;margin-top:8px;}
.btn-primary:hover{opacity:0.85;}
.auth-error{font-size:12px;color:var(--down);margin-top:10px;text-align:center;min-height:18px;}

/* APP */
#app{display:none;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(7,11,18,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;transition:all 0.3s;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo{font-size:16px;font-weight:900;letter-spacing:-0.5px;}
.user-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.header-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#last-updated{font-size:10px;color:var(--text3);font-family:var(--mono);}
.btn-icon{padding:6px 10px;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:8px;cursor:pointer;font-size:11px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;white-space:nowrap;}
.btn-icon:hover{border-color:var(--blue);color:var(--blue);}
.btn-icon.danger:hover{border-color:var(--down);color:var(--down);}
.btn-icon.active-mini{border-color:var(--blue);color:var(--blue);background:var(--blue)15;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;white-space:nowrap;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}

/* CONTENT */
.content{padding:18px 20px;max-width:960px;margin:0 auto;transition:all 0.3s;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ALERT */
.alert-banner{background:#ff980015;border:1px solid #ff980040;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--warn);display:none;align-items:center;gap:8px;}
.alert-banner.show{display:flex;}
.notice{background:#4a9eff10;border:1px solid #4a9eff25;border-radius:10px;padding:9px 14px;font-size:12px;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 16px 11px 42px;color:var(--text);font-size:14px;outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--blue);}
.search-input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.dropdown{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;z-index:50;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,0.6);display:none;}
.dropdown.show{display:block;}
.dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:var(--surface);}
.d-name{font-weight:600;font-size:14px;}
.d-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.badge{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:600;}
.badge.kospi{background:#4a9eff18;color:var(--blue);}
.badge.kosdaq{background:#00e67618;color:var(--up);}
.badge.us{background:#ffc94718;color:var(--gold);}
.badge.direct{background:#ffc94718;color:var(--gold);}

/* STOCK CARD */
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;margin-bottom:9px;transition:all 0.35s;position:relative;}
.stock-card:hover{border-color:var(--border2);}
.stock-card.flash-up{border-color:var(--up);background:#00e67606;}
.stock-card.flash-down{border-color:var(--down);background:#ff525206;}
.stock-card.alert-card{border-color:var(--warn);background:#ff980008;}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.stock-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--surface2),var(--border2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--blue);flex-shrink:0;}
.stock-name{font-weight:700;font-size:14px;}
.stock-meta{font-size:11px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ai-summary{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;font-style:italic;}
.card-right-group{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.card-right{text-align:right;}
.stock-price{font-size:17px;font-weight:800;letter-spacing:-0.5px;font-family:var(--mono);}
.stock-change{font-size:11px;font-weight:600;margin-top:2px;font-family:var(--mono);}
.up{color:var(--up);}
.down{color:var(--down);}
.neutral{color:var(--text2);}
.warn-price{color:var(--warn);}
.card-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.btn-sm{padding:4px 9px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;white-space:nowrap;}
.btn-sm:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm.danger:hover{border-color:var(--down);color:var(--down);}
.btn-naver{padding:4px 9px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #03c75a40;background:#03c75a10;color:#03c75a;font-family:'Noto Sans KR',sans-serif;text-decoration:none;display:inline-flex;align-items:center;transition:all 0.2s;}
.btn-naver:hover{background:#03c75a20;}

/* DETAIL */
.card-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);grid-template-columns:repeat(4,1fr);gap:8px;}
.card-detail.open{display:grid;}
/* 분할매수 내역 */
.lots-list{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.lots-list.open{display:block;}
.lot-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;font-size:12px;}
.lot-info{color:var(--text2);}
.lot-price{font-weight:700;font-family:var(--mono);color:var(--text);}
.lot-profit{font-family:var(--mono);font-size:11px;}
.detail-item{background:var(--bg);border-radius:9px;padding:9px 12px;}
.detail-label{font-size:9px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;}
.detail-value{font-size:13px;font-weight:600;font-family:var(--mono);}

/* EMPTY */
.empty-state{text-align:center;padding:50px 20px;background:var(--surface);border:1px dashed var(--border2);border-radius:16px;color:var(--text2);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;margin-bottom:5px;}
.empty-desc{font-size:12px;color:var(--text3);}

/* SUMMARY */
.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.s-label{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.s-value{font-size:18px;font-weight:800;font-family:var(--mono);letter-spacing:-0.5px;}
.s-sub{font-size:11px;color:var(--text2);margin-top:3px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:28px;width:360px;max-width:92vw;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:22px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{padding:11px 18px;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:10px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
.btn-confirm{flex:1;padding:11px;background:linear-gradient(135deg,#1a5eff,#4a9eff);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* NEWS */
.news-row{display:flex;gap:8px;margin-bottom:16px;}
.news-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;}
.news-input:focus{border-color:var(--blue);}
.news-input::placeholder{color:var(--text3);}
.btn-search{padding:11px 20px;background:linear-gradient(135deg,#1a5eff,#4a9eff);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:9px;border-left:3px solid var(--border2);}
.news-card.positive{border-left-color:var(--up);}
.news-card.negative{border-left-color:var(--down);}
.news-card.neutral{border-left-color:var(--blue);}
.news-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px;}
.news-title{font-size:14px;font-weight:600;line-height:1.4;}
.news-badge{font-size:10px;padding:2px 8px;border-radius:5px;white-space:nowrap;font-weight:600;}
.news-badge.positive{background:#00e67618;color:var(--up);}
.news-badge.negative{background:#ff525218;color:var(--down);}
.news-badge.neutral{background:#4a9eff18;color:var(--blue);}
.news-summary{font-size:12px;color:var(--text2);line-height:1.6;}
.news-impact{font-size:12px;margin-top:7px;padding:6px 10px;border-radius:7px;background:var(--bg);}
.news-time{font-size:10px;color:var(--text3);margin-top:6px;font-family:var(--mono);}
.loading-state{text-align:center;padding:50px;color:var(--text2);}
.spinner{font-size:26px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MINI WIDGET MODE ── */
body.mini-mode{background:var(--bg);}
body.mini-mode #app{
  position:fixed; top:0; left:0;
  width:320px; height:100vh;
  border-right:1px solid var(--border2);
  box-shadow:4px 0 30px rgba(0,0,0,0.5);
  overflow-y:auto;
  z-index:9999;
}
body.mini-mode .header{height:42px;padding:0 12px;}
body.mini-mode .header-logo{font-size:12px;}
body.mini-mode .user-chip{display:none;}
body.mini-mode #last-updated{font-size:9px;}
body.mini-mode .btn-icon{padding:4px 7px;font-size:10px;}
body.mini-mode .tabs{padding:0 8px;}
body.mini-mode .tab{padding:8px 10px;font-size:11px;}
body.mini-mode .content{padding:8px 10px;}
body.mini-mode .stock-card{padding:9px 10px;margin-bottom:5px;border-radius:10px;}
body.mini-mode .stock-icon{width:30px;height:30px;font-size:11px;border-radius:8px;}
body.mini-mode .stock-name{font-size:12px;}
body.mini-mode .stock-meta{font-size:10px;}
body.mini-mode .stock-price{font-size:14px;}
body.mini-mode .stock-change{font-size:10px;}
body.mini-mode .ai-summary{display:none;}
body.mini-mode .card-actions{display:none;}
body.mini-mode .card-detail{display:none!important;}
body.mini-mode .notice{display:none;}
body.mini-mode .alert-banner{font-size:10px;padding:6px 10px;}
body.mini-mode .summary-cards{grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
body.mini-mode .summary-card{padding:10px 12px;border-radius:10px;}
body.mini-mode .s-label{font-size:9px;}
body.mini-mode .s-value{font-size:14px;}
body.mini-mode .s-sub{display:none;}
body.mini-mode .search-wrap{display:none;}
body.mini-mode .news-row{display:none;}
body.mini-mode .empty-state{padding:30px 10px;}
body.mini-mode .empty-icon{font-size:28px;}
body.mini-mode .empty-title{font-size:13px;}

/* 미니모드 토글 버튼 */
#mini-toggle-btn{
  position:fixed; bottom:20px; right:20px;
  width:44px; height:44px;
  background:linear-gradient(135deg,#1a5eff,#4a9eff);
  border:none; border-radius:50%;
  color:#fff; font-size:18px;
  cursor:pointer; z-index:10000;
  box-shadow:0 4px 20px rgba(74,158,255,0.4);
  display:none; align-items:center; justify-content:center;
  transition:all 0.3s;
}
body.mini-mode #mini-toggle-btn{display:flex;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

@media(max-width:600px){
  .summary-cards{grid-template-columns:1fr 1fr;}
  .card-detail{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">📈 주식AI비서</div>
    <div class="auth-sub">나만의 AI 주식 비서</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">회원가입</button>
    </div>
    <div id="auth-login">
      <div class="form-group">
        <label class="form-label">닉네임</label>
        <input class="form-input" id="login-name" placeholder="닉네임 입력" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" id="login-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
    </div>
    <div id="auth-signup" style="display:none">
      <div class="form-group">
        <label class="form-label">닉네임</label>
        <input class="form-input" id="signup-name" placeholder="사용할 닉네임 입력" onkeydown="if(event.key==='Enter')doSignup()">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" id="signup-pw" type="password" placeholder="비밀번호 설정 (4자 이상)" onkeydown="if(event.key==='Enter')doSignup()">
      </div>
      <button class="btn-primary" onclick="doSignup()">회원가입</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📈 주식AI</div>
      <div class="user-chip" id="user-chip"></div>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <span id="last-updated">--:--</span>
      <button class="btn-icon" onclick="toggleMini()" id="mini-btn">🔲 미니</button>
      <button class="btn-icon danger" onclick="doLogout()">나가기</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('watchlist')">⭐ 관심종목</button>
    <button class="tab" onclick="switchTab('holdings')">💼 보유종목</button>
    <button class="tab" onclick="switchTab('news')">📰 뉴스분석</button>
  </div>

  <div class="content">
    <!-- 관심종목 -->
    <div id="tab-watchlist" class="tab-panel active">
      <div class="alert-banner" id="alert-banner">⚠️ <span id="alert-text"></span></div>
      <div class="notice">ℹ️ Yahoo Finance · 약 15~20분 지연 · 1분 자동 갱신 · 종목코드 직접 입력도 가능</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="watch-search" placeholder="한국/미국 종목 검색 (예: 삼성전자, 프로티나, NVDA, TSLA)" oninput="searchStocks(this.value,'watch-dd')" autocomplete="off">
        <div class="dropdown" id="watch-dd"></div>
      </div>
      <div id="watchlist-container"></div>
    </div>

    <!-- 보유종목 -->
    <div id="tab-holdings" class="tab-panel">
      <div class="summary-cards">
        <div class="summary-card">
          <div class="s-label">총 평가금액</div>
          <div class="s-value" id="total-eval">-</div>
          <div class="s-sub">보유종목 합산</div>
        </div>
        <div class="summary-card">
          <div class="s-label">총 수익</div>
          <div class="s-value" id="total-profit">-</div>
          <div class="s-sub" id="total-rate">-</div>
        </div>
        <div class="summary-card">
          <div class="s-label">매입금액</div>
          <div class="s-value" id="total-invest">-</div>
          <div class="s-sub">투자 원금</div>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="hold-search" placeholder="한국/미국 종목 검색 (예: 삼성전자, 프로티나, NVDA, TSLA)" oninput="searchStocks(this.value,'hold-dd')" autocomplete="off">
        <div class="dropdown" id="hold-dd"></div>

async function fetchPrice(code,market){
  // 미국 주식은 코드 그대로, 한국은 .KS/.KQ 추가
  const sym = market==='US' ? code : (market==='KOSPI'?code+'.KS':code+'.KQ');
  const url='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'?interval=1d&range=1d';
  const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
  try{
    const res=await fetch(proxy,{cache:'no-store'});
    const outer=await res.json();
    const d=JSON.parse(outer.contents);
    const meta=d?.chart?.result?.[0]?.meta;
    if(!meta) return null;
    const price=meta.regularMarketPrice;
    const prev=meta.previousClose||meta.chartPreviousClose||price;
    const change=price-prev;
    const isUS = !sym.endsWith('.KS') && !sym.endsWith('.KQ');
    const round = isUS ? (n=>Math.round(n*100)/100) : Math.round;
    return {
      price: isUS ? parseFloat(price.toFixed(2)) : Math.round(price),
      change: isUS ? parseFloat(change.toFixed(2)) : Math.round(change),
      changeRate: parseFloat(((change/prev)*100).toFixed(2)),
      open: isUS ? parseFloat((meta.regularMarketOpen||price).toFixed(2)) : Math.round(meta.regularMarketOpen||price),
      high: isUS ? parseFloat((meta.regularMarketDayHigh||price).toFixed(2)) : Math.round(meta.regularMarketDayHigh||price),
      low: isUS ? parseFloat((meta.regularMarketDayLow||price).toFixed(2)) : Math.round(meta.regularMarketDayLow||price),
      volume: meta.regularMarketVolume||0,
      isUS,
    };
  }catch{return null;}
}

async function getAiSummary(code){
  if(aiSummaries[code]) return aiSummaries[code];
  const s=findStock(code); const d=stockPrices[code];
  if(!s||!d) return null;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:150,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`${s.name}(${code}) 주식 현재 상황을 30자 이내 한 줄로 요약. 현재가 ${d.price}원 ${d.changeRate}%. 예: "외국인 순매수 전환, 단기 반등 가능성"`}]
      })
    });
    const data=await res.json();
    const text=data.content.filter(i=>i.type==='text').map(i=>i.text).join('').trim();
    if(text){ aiSummaries[code]=text; return text; }
    return null;
  }catch(e){ console.error('AI summary error',e); return null; }
}

// lots 기반 합산 계산
function calcHolding(h){
  const lots = h.lots || [{buyPrice:h.buyPrice, qty:h.qty}];
  const totalQty = lots.reduce((s,l)=>s+l.qty, 0);
  const totalInvest = lots.reduce((s,l)=>s+l.buyPrice*l.qty, 0);
  const avgPrice = totalInvest / totalQty;
  return {lots, totalQty, totalInvest, avgPrice};
}

function renderHoldings(){
  let ti=0,te=0;
  userStore.holdings.forEach(h=>{
    const d=stockPrices[h.code];
    const {totalQty,totalInvest}=calcHolding(h);
    ti+=totalInvest;
    te+=(d?d.price:totalInvest/totalQty)*totalQty;
  });
  const tp=te-ti,tr=ti>0?((tp/ti)*100).toFixed(2):0;
  const has=userStore.holdings.length>0;
  document.getElementById('total-eval').textContent=has?fmt(te)+'원':'-';
  document.getElementById('total-invest').textContent=has?fmt(ti)+'원':'-';
  const pe=document.getElementById('total-profit');
  pe.textContent=has?(tp>=0?'+':'')+fmt(tp)+'원':'-';
  pe.className='s-value '+(tp>=0?'up':'down');
  document.getElementById('total-rate').textContent=has?(tr>=0?'+':'')+tr+'%':'-';
  const el=document.getElementById('holdings-container');
  if(!userStore.holdings.length){el.innerHTML=emptyState('💼','보유종목이 없습니다','검색창에서 종목을 추가해보세요');return;}
  el.innerHTML=userStore.holdings.map(h=>{const s=findStock(h.code);if(!s)return'';return buildHoldingCard(s,stockPrices[h.code],h);}).join('');
}

    if(!userStore.holdings[idx].lots){
      // 구버전 데이터 마이그레이션
      userStore.holdings[idx].lots=[{buyPrice:userStore.holdings[idx].buyPrice,qty:userStore.holdings[idx].qty}];
    }
    userStore.holdings[idx].lots.push({buyPrice:buy,qty});
    if(target!==null) userStore.holdings[idx].target=target;
  } else {
    // 새 종목 추가
    userStore.holdings.push({code:pendingCode, lots:[{buyPrice:buy,qty}], target});
  }
  await saveStore(); closeModal();
  const s=findStock(pendingCode);
  if(s) fetchPrice(s.code,s.market).then(d=>{if(d)stockPrices[s.code]=d;renderHoldings();});
}

async function removeLot(code, lotIdx){
  const idx=userStore.holdings.findIndex(h=>h.code===code);
  if(idx<0) return;
  userStore.holdings[idx].lots.splice(lotIdx,1);
  if(userStore.holdings[idx].lots.length===0){
    userStore.holdings.splice(idx,1);
  }
  await saveStore(); renderHoldings();
}
async function removeHolding(code){
  if(!confirm(findStock(code)?.name+' 전체 삭제하시겠어요?')) return;
  userStore.holdings=userStore.holdings.filter(h=>h.code!==code);
  await saveStore(); renderHoldings();
}

// ── CARD BUILDERS ──
function buildWatchCard(s,d){
  const isUp=d&&d.changeRate>=0;
  const cls=d?(isUp?'up':'down'):'neutral';
  const changeStr=d?fmtChange(d.change,d.changeRate,d.isUS):'-';
  const isAlert=d&&d.changeRate<=-5;
  const naver='https://finance.naver.com/item/main.naver?code='+s.code;
  const detId='det-w-'+s.code;
  const detHtml=d?`<div class="card-detail" id="${detId}">
    <div class="detail-item"><div class="detail-label">시가</div><div class="detail-value">${fmt(d.open)}</div></div>
    <div class="detail-item"><div class="detail-label">고가</div><div class="detail-value up">${fmt(d.high)}</div></div>
    <div class="detail-item"><div class="detail-label">저가</div><div class="detail-value down">${fmt(d.low)}</div></div>
    <div class="detail-item"><div class="detail-label">거래량</div><div class="detail-value">${fmtVol(d.volume)}</div></div>
  </div>`:'';
  return `<div class="stock-card${isAlert?' alert-card':''}" onclick="toggleDetail('${detId}')">
    <div class="card-top">
      <div class="card-left">
        <div class="stock-icon">${s.name[0]}</div>
        <div>
          <div class="stock-name">${isAlert?'⚠️ ':''}${s.name}</div>
          <div class="stock-meta"><span>${s.code}</span><span class="badge ${s.market.toLowerCase()}">${s.market}</span></div>
          <div class="ai-summary" id="ai-${s.code}">🤖 AI요약 버튼을 눌러보세요</div>
        </div>
      </div>
      <div class="card-right-group">
        <div class="card-right">
          <div class="stock-price ${isAlert?'warn-price':''}">${d?fmtPrice(d.price,d.isUS):'조회중'}</div>
          <div class="stock-change ${cls}">${changeStr}</div>
        </div>
        <div class="card-actions">
          <a class="btn-naver" href="${naver}" target="_blank" onclick="event.stopPropagation()">N</a>
          <button class="btn-sm" onclick="event.stopPropagation();loadAiSummary('${s.code}')">AI요약</button>
          <button class="btn-sm danger" onclick="event.stopPropagation();removeFromWatchlist('${s.code}')">삭제</button>
        </div>
      </div>
    </div>${detHtml}</div>`;
}

function buildHoldingCard(s,d,h){
  const {lots,totalQty,totalInvest,avgPrice}=calcHolding(h);
  const cur=d?d.price:avgPrice;
  const isUS=d?.isUS||findStock(h.code)?.market==='US';
  const evalAmt=cur*totalQty, profit=evalAmt-totalInvest;
  const rate=((profit/totalInvest)*100).toFixed(2);
  const isUp=profit>=0; const cls=isUp?'up':'down';
  const naver='https://finance.naver.com/item/main.naver?code='+s.code;
  const targetHit=h.target&&d&&d.price>=h.target;
  const lotsId='lots-'+s.code;

  const lotsHtml=lots.map((l,i)=>{
    const lProfit=d?(d.price-l.buyPrice)*l.qty:0;
    const lRate=((lProfit/((l.buyPrice||1)*l.qty))*100).toFixed(1);
    const lCls=lProfit>=0?'up':'down';
    return `<div class="lot-item">
      <div class="lot-info">${l.qty}주 @ <span class="lot-price">${fmt(l.buyPrice)}원</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        ${d?`<span class="lot-profit ${lCls}">${lProfit>=0?'+':''}${d.isUS?'$'+Math.abs(lProfit).toFixed(2):fmt(Math.abs(lProfit))+'원'} (${lProfit>=0?'+':''}${lRate}%)</span>`:''}
        <button class="btn-sm danger" onclick="event.stopPropagation();removeLot('${s.code}',${i})">삭제</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="stock-card${targetHit?' flash-up':''}" onclick="toggleLots('${lotsId}')">
    <div class="card-top">
      <div class="card-left">
        <div class="stock-icon">${s.name[0]}</div>
        <div>
          <div class="stock-name">${targetHit?'🎯 ':''}${s.name}</div>
          <div class="stock-meta">
            <span>${s.code}</span>
            <span class="badge ${s.market.toLowerCase()}">${s.market}</span>
            <span>총 ${totalQty}주 · 평균 ${fmt(Math.round(avgPrice))}원</span>
            ${h.target?`<span>목표 ${fmt(h.target)}원</span>`:''}
          </div>
        </div>
      </div>
      <div class="card-right-group">
        <div class="card-right">
          <div class="stock-price">${fmtPrice(evalAmt,isUS)}</div>
          <div class="stock-change ${cls}">${isUp?'+':''}${isUS?'$'+Math.abs(profit).toFixed(2):fmt(Math.abs(profit))+'원'} (${isUp?'+':''}${rate}%)</div>
          ${d?`<div class="stock-change ${d.changeRate>=0?'up':'down'}">${d.changeRate>=0?'▲':'▼'} ${Math.abs(d.changeRate)}%</div>`:''}
        </div>
        <div class="card-actions">
          <a class="btn-naver" href="${naver}" target="_blank" onclick="event.stopPropagation()">N</a>
          <button class="btn-sm" onclick="event.stopPropagation();openModal('${s.code}')">+ 추가</button>
          <button class="btn-sm danger" onclick="event.stopPropagation();removeHolding('${s.code}')">전체삭제</button>
        </div>
      </div>
    </div>
    <div class="card-detail open" style="margin-top:10px">
      <div class="detail-item"><div class="detail-label">현재가</div><div class="detail-value">${fmtPrice(cur,isUS)}</div></div>
      <div class="detail-item"><div class="detail-label">평가금액</div><div class="detail-value">${fmtPrice(evalAmt,isUS)}</div></div>
      <div class="detail-item"><div class="detail-label">매입금액</div><div class="detail-value">${fmtPrice(totalInvest,isUS)}</div></div>
      <div class="detail-item"><div class="detail-label">수익률</div><div class="detail-value ${cls}">${isUp?'+':''}${rate}%</div></div>
    </div>
    <div class="lots-list" id="${lotsId}">
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">📋 매수 내역 (${lots.length}건)</div>
      ${lotsHtml}
    </div>
  </div>`;
}

function toggleLots(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function toggleDetail(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}

// ── SEARCH (AI 기반 전종목 검색) ──
let _sTmr=null;
function searchStocks(q,ddId){
  const dd=document.getElementById(ddId);
  clearTimeout(_sTmr);
  if(!q.trim()){dd.classList.remove('show');return;}
  // 로컬 목록에서 먼저 빠르게
  const allStocks=[...STOCKS,...US_STOCKS];
  const local=allStocks.filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||s.code.toLowerCase().includes(q.toLowerCase())).slice(0,5);
  const isHold=ddId==='hold-dd';
  if(local.length){
    dd.innerHTML=local.map(s=>makeDdItem(s,isHold)).join('')+'<div style="padding:8px 16px;font-size:11px;color:var(--text3)">🔍 더 검색 중...</div>';
    dd.classList.add('show');
  } else {
    dd.innerHTML='<div style="padding:12px 16px;font-size:12px;color:var(--text3)">🔍 검색 중...</div>';
    dd.classList.add('show');
  }
  // 코드 직접 입력 - 한국(숫자6자리) 또는 미국(영문 티커)
  if(/^\d{5,6}$/.test(q.trim())){
    const c=q.trim().padStart(6,'0');
    dd.innerHTML=[{code:c,name:c+' (KOSPI)',market:'KOSPI'},{code:c,name:c+' (KOSDAQ)',market:'KOSDAQ'}].map(s=>makeDdItem(s,isHold)).join('');
    return;
  }
  if(/^[A-Za-z]{1,5}$/.test(q.trim())){
    const c=q.trim().toUpperCase();
    const found=US_STOCKS.find(s=>s.code===c);
    if(found){
      dd.innerHTML=makeDdItem(found,isHold);
      return;
    }
  }
  // AI 검색 (0.5초 디바운스)
  _sTmr=setTimeout(()=>aiSearch(q,ddId,isHold,local),500);
}

async function aiSearch(q,ddId,isHold,localRes){
  const dd=document.getElementById(ddId);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:600,
        messages:[{role:'user',content:`주식 종목 "${q}" 검색. 한국 주식(KOSPI/KOSDAQ)과 미국 주식(US) 모두 포함. JSON 배열만 응답. 설명없이 JSON만. 없으면[]. 형식:[{"code":"종목코드","name":"종목명","market":"KOSPI또는KOSDAQ또는US"}] 최대8개. 미국주식 코드는 AAPL,TSLA 같은 티커심볼.`}]
      })
    });
    const data=await res.json();
    const txt=data.content.filter(i=>i.type==='text').map(i=>i.text).join('');
    const m=txt.match(/\[[\s\S]*?\]/);
    if(!m){
      if(!localRes.length) dd.innerHTML='<div style="padding:12px 16px;font-size:12px;color:var(--text3)">검색 결과 없음</div>';
      return;
    }
    const results=JSON.parse(m[0]);
    // 중복 제거
    const merged=[...results];
    dd.innerHTML=merged.map(s=>makeDdItem(s,isHold)).join('');
  }catch(e){
    if(!localRes.length) dd.innerHTML='<div style="padding:12px 16px;font-size:12px;color:var(--text3)">검색 오류. 코드를 직접 입력해보세요</div>';
  }
}

function makeDdItem(s,isHold){
  const fn=isHold?`openModal('${s.code}','${s.name}','${s.market}')`:`addToWatchlist('${s.code}','${s.name}','${s.market}')`;
  return `<div class="dropdown-item" onclick="${fn}">
    <div><div class="d-name">${s.name}</div><div class="d-meta">${s.code} · <span class="badge ${s.market.toLowerCase()}">${s.market}</span></div></div>
    <button class="btn-sm">${isHold?'+ 추가':'+ 관심'}</button>
  </div>`;
}
function closeDD(){
  document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('show'));
  document.getElementById('watch-search').value='';
  document.getElementById('hold-search').value='';
}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))closeDD();});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── NEWS ──
async function searchNews(){
  const q=document.getElementById('news-input').value.trim();
  if(!q)return;
  const container=document.getElementById('news-container');
  container.innerHTML=`<div class="loading-state"><div class="spinner">⟳</div><div>AI가 뉴스를 분석하는 중...</div></div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`"${q}" 관련 한국 주식 최신 뉴스 5개 검색 후 JSON만 응답. 형식: [{"title":"제목","summary":"2줄 요약","sentiment":"positive/negative/neutral","impact":"주가 영향 한줄","time":"시간"}]`}]
      })
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if(!jsonMatch) throw new Error('JSON not found');
    const news=JSON.parse(jsonMatch[0]);
    container.innerHTML=news.map(n=>`
      <div class="news-card ${n.sentiment}">
        <div class="news-header">
          <div class="news-title">${n.title}</div>
          <span class="news-badge ${n.sentiment}">${n.sentiment==='positive'?'호재 ✅':n.sentiment==='negative'?'악재 ❌':'중립 ➖'}</span>
        </div>
        <div class="news-summary">${n.summary}</div>
        <div class="news-impact">📊 ${n.impact}</div>
        <div class="news-time">🕐 ${n.time}</div>
      </div>`).join('');
  }catch{container.innerHTML=emptyState('⚠️','분석 중 오류가 발생했습니다','잠시 후 다시 시도해주세요');}
}

// ── TABS ──
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['watchlist','holdings','news'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── MINI MODE ──
function toggleMini(){
  isMini=!isMini;
  document.body.classList.toggle('mini-mode',isMini);
  const btn=document.getElementById('mini-btn');
  btn.textContent=isMini?'🔳 전체':'🔲 미니';
  btn.classList.toggle('active-mini',isMini);
}

// ── UTILS ──
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtPrice(n, isUS){
  if(isUS) return '$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return fmt(n)+'원';
}
function fmtChange(change, changeRate, isUS){
  const sign = changeRate>=0?'▲ +':'▼ ';
  const chStr = isUS ? '$'+Math.abs(change).toFixed(2) : fmt(Math.abs(change))+'원';
  return sign+Math.abs(changeRate)+'% ('+chStr+')';
}
function fmtVol(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return n?.toString()||'-';}
function emptyState(icon,title,desc){return`<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-desc">${desc}</div></div>`;}
