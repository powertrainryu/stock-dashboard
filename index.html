<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#070b12">
<title>주식 AI 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b12;--card:#0d1421;--card2:#111c2e;--line:#1a2840;--line2:#243553;--txt:#dce8f5;--txt2:#6b87aa;--txt3:#3d5472;--up:#00e676;--dn:#ff5252;--bl:#4a9eff;--go:#ffc947;--wn:#ff9800;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;min-height:100vh;font-size:14px;}
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#0d2040,var(--bg) 65%);padding:20px;}
.abox{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:40px 28px;}
.alogo{font-size:28px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#4a9eff,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.asub{font-size:13px;color:var(--txt2);margin-bottom:28px;}
.atabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px;}
.atab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--txt3);border-radius:8px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;}
.atab.on{background:var(--card2);color:var(--bl);}
.fg{margin-bottom:14px;}
.fl{font-size:11px;color:var(--txt2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:1px;}
.fi{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:11px 14px;color:var(--txt);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.fi:focus{border-color:var(--bl);}
.fi::placeholder{color:var(--txt3);}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,#1a5eff,#4a9eff);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px;}
.aerr{font-size:12px;color:var(--dn);margin-top:10px;text-align:center;min-height:18px;}
#app{display:none;}
.hdr{position:sticky;top:0;z-index:100;background:rgba(7,11,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:0 12px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;justify-content:space-between;gap:4px;min-height:48px;}
.hdr-l{display:flex;align-items:center;gap:6px;min-width:0;flex-shrink:1;}
.logo{font-size:14px;font-weight:900;white-space:nowrap;}
.uchip{display:none;}
.hdr-r{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#upd{font-size:9px;color:var(--txt3);font-family:var(--mono);}
.hbtn{padding:4px 8px;background:none;border:1px solid var(--line2);color:var(--txt2);border-radius:8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.hbtn.mon{border-color:var(--bl);color:var(--bl);}
.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--card);padding:0 16px;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--txt3);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.tab.on{color:var(--bl);border-bottom-color:var(--bl);font-weight:700;}
.cont{padding:16px;max-width:960px;margin:0 auto;}
.panel{display:none;}.panel.on{display:block;}
.abanner{background:#ff980015;border:1px solid #ff980040;border-radius:10px;padding:9px 14px;margin-bottom:12px;font-size:12px;color:var(--wn);display:none;align-items:center;gap:8px;}
.abanner.on{display:flex;}
.notice{background:#4a9eff10;border:1px solid #4a9eff20;border-radius:10px;padding:8px 14px;font-size:12px;color:var(--txt2);margin-bottom:14px;}
.swrap{position:relative;margin-bottom:14px;}
.si{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 16px 11px 40px;color:var(--txt);font-size:14px;outline:none;font-family:'Noto Sans KR',sans-serif;}
.si:focus{border-color:var(--bl);}
.si::placeholder{color:var(--txt3);}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:15px;pointer-events:none;}
.sdd{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--card2);border:1px solid var(--line2);border-radius:12px;z-index:50;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none;}
.sdd.on{display:block;}
.sdi{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
.sdi:last-child{border-bottom:none;}
.sdi:hover{background:var(--card);}
.sdi-n{font-weight:600;font-size:13px;}
.sdi-m{font-size:11px;color:var(--txt2);margin-top:2px;}
.badge{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:600;}
.bkp{background:#4a9eff18;color:var(--bl);}
.bkq{background:#00e67618;color:var(--up);}
.bus{background:#ffc94718;color:var(--go);}
.shint{padding:12px 14px;font-size:12px;color:var(--txt3);}
.sbtn{padding:4px 9px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--line2);background:none;color:var(--txt2);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.scard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;transition:opacity .15s,transform .15s;}.scard.dragging{opacity:.4;transform:scale(.97);}.scard.dragover{border-color:var(--bl);border-style:dashed;}
.scard.warn{border-color:var(--wn);background:#ff980008;}
.scard.tgt{border-color:var(--up);background:#00e67606;}
.ct{display:flex;align-items:center;gap:8px;}
.cico{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--card2),var(--line2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--bl);}
.cnm{flex:1;min-width:0;overflow:hidden;}
.cname{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmeta{font-size:11px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cpw{text-align:right;flex-shrink:0;}
.cprice{font-size:15px;font-weight:800;font-family:var(--mono);white-space:nowrap;}
.cchg{font-size:11px;font-weight:600;font-family:var(--mono);margin-top:2px;white-space:nowrap;}
.up{color:var(--up);}.dn{color:var(--dn);}.nt{color:var(--txt2);}.wt{color:var(--wn);}
.cact{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.cbtn{padding:4px 10px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--line2);background:none;color:var(--txt2);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.cbtn:hover{border-color:var(--bl);color:var(--bl);}
.cbtn.red:hover{border-color:var(--dn);color:var(--dn);}
.nbtn{padding:4px 10px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #03c75a40;background:#03c75a10;color:#03c75a;font-family:'Noto Sans KR',sans-serif;text-decoration:none;}
.aisumm{font-size:11px;color:var(--txt2);margin-top:8px;font-style:italic;line-height:1.5;display:none;}.aisumm.show{display:block;}
.cdet{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);grid-template-columns:repeat(4,1fr);gap:7px;}
.cdet.on{display:grid;}
.di{background:var(--bg);border-radius:8px;padding:8px 10px;}
.dlbl{font-size:9px;color:var(--txt3);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;}
.dval{font-size:12px;font-weight:600;font-family:var(--mono);}
.lots{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.lots.on{display:block;}
.lot-hd{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.lot-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:8px;padding:8px 10px;margin-bottom:4px;}
.lot-i{font-size:12px;color:var(--txt2);}
.lot-r{display:flex;align-items:center;gap:8px;}
.lot-p{font-size:11px;font-family:var(--mono);}
.scards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.sc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;}
.sc-l{font-size:10px;color:var(--txt3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.sc-v{font-size:18px;font-weight:800;font-family:var(--mono);letter-spacing:-.5px;}
.sc-s{font-size:11px;color:var(--txt2);margin-top:3px;}
.empty{text-align:center;padding:50px 20px;background:var(--card);border:1px dashed var(--line2);border-radius:14px;color:var(--txt2);}
.ei{font-size:38px;margin-bottom:12px;}
.et{font-size:15px;font-weight:600;margin-bottom:5px;}
.es{font-size:12px;color:var(--txt3);}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:20px;}
.moverlay.on{display:flex;}
.modal{background:var(--card2);border:1px solid var(--line2);border-radius:20px;padding:28px;width:100%;max-width:360px;}
.mttl{font-size:17px;font-weight:700;margin-bottom:4px;}
.msub{font-size:12px;color:var(--txt2);margin-bottom:20px;}
.mact{display:flex;gap:8px;margin-top:20px;}
.mc{padding:11px 16px;background:none;border:1px solid var(--line2);color:var(--txt2);border-radius:10px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
.mo{flex:1;padding:11px;background:linear-gradient(135deg,#1a5eff,#4a9eff);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.nrow{display:flex;gap:8px;margin-bottom:14px;}
.ni{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--txt);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.ni:focus{border-color:var(--bl);}
.ni::placeholder{color:var(--txt3);}
.nsb{padding:11px 18px;background:linear-gradient(135deg,#1a5eff,#4a9eff);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.nc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:8px;border-left:3px solid var(--line2);}
.nc.pos{border-left-color:var(--up);}.nc.neg{border-left-color:var(--dn);}.nc.neu{border-left-color:var(--bl);}
.nhdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:7px;}
.nttl{font-size:14px;font-weight:600;line-height:1.4;}
.nbdg{font-size:10px;padding:2px 8px;border-radius:5px;white-space:nowrap;font-weight:600;flex-shrink:0;}
.nbdg.pos{background:#00e67618;color:var(--up);}.nbdg.neg{background:#ff525218;color:var(--dn);}.nbdg.neu{background:#4a9eff18;color:var(--bl);}
.nsum{font-size:12px;color:var(--txt2);line-height:1.6;}
.nimp{font-size:12px;margin-top:7px;padding:6px 10px;border-radius:7px;background:var(--bg);}
.ntm{font-size:10px;color:var(--txt3);margin-top:6px;font-family:var(--mono);}
.loading{text-align:center;padding:50px;color:var(--txt2);}
.spin{font-size:26px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
body.mini #app{position:fixed!important;top:0;left:0;width:268px!important;height:100vh!important;background:var(--bg)!important;border-right:1px solid var(--line2);box-shadow:4px 0 20px rgba(0,0,0,.8);display:flex!important;flex-direction:column;overflow:hidden;z-index:9999;}
body.mini .hdr{height:44px;padding:0 10px;flex-shrink:0;}
body.mini .logo{font-size:11px;}
body.mini .uchip{display:none;}
body.mini #upd{display:none;}
body.mini .ldot{display:none;}
body.mini .hbtn{padding:4px 8px;font-size:10px;}
body.mini .tabs{padding:0 6px;flex-shrink:0;}
body.mini .tab{padding:6px 8px;font-size:10px;}
body.mini .cont{padding:6px 8px;flex:1;overflow-y:auto;max-width:100%;}
body.mini .scard{padding:8px 10px;margin-bottom:4px;border-radius:10px;}
body.mini .cico{width:26px;height:26px;font-size:10px;border-radius:7px;}
body.mini .cname{font-size:12px;}
body.mini .cmeta{display:none;}
body.mini .cprice{font-size:13px;}
body.mini .cchg{font-size:10px;}
body.mini .cact{display:none;}
body.mini .cdet{display:none!important;}
body.mini .aisumm{display:none;}
body.mini .lots{display:none!important;}
body.mini .notice{display:none;}
body.mini .swrap{display:none;}
body.mini .nrow{display:none;}
body.mini .abanner{font-size:9px;padding:4px 8px;}
body.mini .scards{grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
body.mini .sc{padding:8px 10px;border-radius:10px;}
body.mini .sc-l{font-size:8px;margin-bottom:2px;}
body.mini .sc-v{font-size:13px;}
body.mini .sc-s{display:none;}
body.mini .empty{padding:20px 8px;}
body.mini .ei{font-size:22px;margin-bottom:5px;}
body.mini .et{font-size:12px;}
body.mini .es{font-size:10px;}
@media(max-width:600px){.scards{grid-template-columns:1fr 1fr;}.cdet{grid-template-columns:1fr 1fr;}.sc-v{font-size:15px;}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px;}
</style>
</head>
<body>
<div id="auth">
  <div class="abox">
    <div class="alogo">📈 주식AI비서</div>
    <div class="asub">나만의 AI 주식 비서</div>
    <div class="atabs">
      <button class="atab on" onclick="atab('login')">로그인</button>
      <button class="atab" onclick="atab('signup')">회원가입</button>
    </div>
    <div id="aL">
      <div class="fg"><label class="fl">닉네임</label><input class="fi" id="lN" placeholder="닉네임 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg"><label class="fl">비밀번호</label><input class="fi" id="lP" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-main" onclick="doLogin()">로그인</button>
    </div>
    <div id="aS" style="display:none">
      <div class="fg"><label class="fl">닉네임</label><input class="fi" id="sN" placeholder="사용할 닉네임" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <div class="fg"><label class="fl">비밀번호</label><input class="fi" id="sP" type="password" placeholder="4자 이상" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <button class="btn-main" onclick="doSignup()">회원가입</button>
    </div>
    <div class="aerr" id="aerr"></div>
  </div>
</div>
<div id="app">
  <div class="hdr">
    <div class="hdr-l"><div class="logo">📈 주식AI</div><div class="uchip" id="uchip"></div></div>
    <div class="hdr-r">
      <div class="ldot"></div><span id="upd">--:--</span>
      <button class="hbtn" id="mbtn" onclick="toggleMini()">🔲 미니</button>
      <button class="hbtn" onclick="doLogout()">나가기</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('W')">⭐ 관심종목</button>
    <button class="tab" onclick="goTab('H')">💼 보유종목</button>
    <button class="tab" onclick="goTab('N')">📰 뉴스분석</button>
  </div>
  <div class="cont">
    <div id="pW" class="panel on">
      <div class="abanner" id="ab">⚠️ <span id="at"></span></div>
      <div class="notice">ℹ️ 네이버 금융 · 실시간 · 1분 갱신 · 전종목</div>
      <div class="swrap"><span class="sico">🔍</span><input class="si" id="wSrc" placeholder="종목 검색 (예: 삼성전자, 프로티나, NVDA)" oninput="onSrc(this.value,'wDD','W')" autocomplete="off"><div class="sdd" id="wDD"></div></div>
      <div id="wL"></div>
    </div>
    <div id="pH" class="panel">
      <div class="scards">
        <div class="sc"><div class="sc-l">총 평가금액</div><div class="sc-v" id="tEv">-</div><div class="sc-s">합산</div></div>
        <div class="sc"><div class="sc-l">총 수익</div><div class="sc-v" id="tPf">-</div><div class="sc-s" id="tRt">-</div></div>
        <div class="sc"><div class="sc-l">매입금액</div><div class="sc-v" id="tIn">-</div><div class="sc-s">원금</div></div>
      </div>
      <div class="swrap"><span class="sico">🔍</span><input class="si" id="hSrc" placeholder="보유종목 추가 (예: 삼성전자, AAPL)" oninput="onSrc(this.value,'hDD','H')" autocomplete="off"><div class="sdd" id="hDD"></div></div>
      <div id="hL"></div>
    </div>
    <div id="pN" class="panel">
      <div class="nrow"><input class="ni" id="nIn" placeholder="종목명 또는 키워드 (예: 삼성전자, 반도체)" onkeydown="if(event.key==='Enter')doNews()"><button class="nsb" onclick="doNews()">AI 분석</button></div>
      <div id="nL"><div class="empty"><div class="ei">📰</div><div class="et">뉴스 AI 분석</div><div class="es">키워드를 입력하면 AI가 호재/악재로 분석해요</div></div></div>
    </div>
  </div>
</div>
<div class="moverlay" id="modal">
  <div class="modal">
    <div class="mttl">보유종목 추가</div>
    <div class="msub" id="mSub"></div>
    <div class="fg"><label class="fl">매입가 (원/$)</label><input class="fi" id="mB" type="number" placeholder="예: 72000"></div>
    <div class="fg"><label class="fl">수량 (주)</label><input class="fi" id="mQ" type="number" placeholder="예: 10"></div>
    <div class="fg"><label class="fl">목표가 (선택)</label><input class="fi" id="mT" type="number" placeholder="선택사항"></div>
    <div class="mact"><button class="mc" onclick="closeModal()">취소</button><button class="mo" onclick="confirmH()">추가하기</button></div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyAZN4CPMFUJkaBqIXEqGeD7XM7rQdWWOM0",authDomain:"stock-dashboard-01.firebaseapp.com",projectId:"stock-dashboard-01",storageBucket:"stock-dashboard-01.firebasestorage.app",messagingSenderId:"471593186490",appId:"1:471593186490:web:abd511c8ee2c5f1f067e83"});
const db=getFirestore(app);
window.$db=db;window.$doc=doc;window.$get=getDoc;window.$set=setDoc;
window.dispatchEvent(new Event('fbReady'));

function setE(m){document.getElementById('aerr').textContent=m;}
function enter(n,d){user=n;store={watchlist:d.watchlist||[],holdings:d.holdings||[]};custom=d.custom||{};saveS(n);document.getElementById('auth').style.display='none';document.getElementById('app').style.display='block';document.getElementById('uchip').textContent='👤 '+n;renderW();renderH();loadP().then(()=>{renderW();renderH();});startR();}
function doLogout(){clearInterval(rTimer);if(isMini)toggleMini();clearS();user=null;store={watchlist:[],holdings:[]};prices={};sums={};custom={};document.getElementById('auth').style.display='flex';document.getElementById('app').style.display='none';}
function findS(c){return KR.find(x=>x.code===c)||US.find(x=>x.code===c)||(custom[c]?{code:c,...custom[c]}:null);}
async function fetchP(code,market){try{const r=await fetch('/api/stock?code='+encodeURIComponent(code)+'&market='+encodeURIComponent(market||'KOSPI'),{cache:'no-store'});if(!r.ok)return null;const d=await r.json();return d.error?null:d;}catch{return null;}}
async function loadP(){
  const codes=[...new Set([...store.watchlist,...store.holdings.map(h=>h.code)])];
  // 순차 로드 - 각 종목 가격 받는 즉시 화면 업데이트
  for(const c of codes){
    const s=findS(c);if(!s)continue;
    const d=await fetchP(s.code,s.market);
    if(d){prices[c]=d;renderW();renderH();}
  }
  document.getElementById('upd').textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

// 개별 카드 가격만 업데이트 (재렌더 없이)
function updateCard(code,d){
  const s=findS(code);if(!s)return;
  const u=s.market==='US';
  // 가격
  const priceEl=document.querySelector(`#wL .scard [data-code="${code}"] .cprice, #hL .scard [data-code="${code}"] .cprice`);
  // 세부내용 업데이트
  const did='dd-'+code;
  const det=document.getElementById(did);
  if(det&&d.open){
    det.innerHTML=`
      <div class="di"><div class="dlbl">시가</div><div class="dval">${fP(d.open,u)}</div></div>
      <div class="di"><div class="dlbl">고가</div><div class="dval up">${fP(d.high,u)}</div></div>
      <div class="di"><div class="dlbl">저가</div><div class="dval dn">${fP(d.low,u)}</div></div>
      <div class="di"><div class="dlbl">거래량</div><div class="dval">${fV(d.volume)}</div></div>
    `;
  }
}
function startR(){clearInterval(rTimer);rTimer=setInterval(async()=>{await loadP();renderW();renderH();},60000);}
function fN(n){return Math.round(n).toLocaleString('ko-KR');}
function fP(n,u){return u?'$'+parseFloat(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):fN(n)+'원';}
function fC(ch,cr,u){const s=cr>=0?'▲ +':'▼ ';return s+Math.abs(cr)+'% ('+(u?'$'+Math.abs(parseFloat(ch)).toFixed(2):fN(Math.abs(ch))+'원')+')';}
function fV(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return n?.toString()||'-';}
function chkA(){const a=[];[...new Set([...store.watchlist,...store.holdings.map(h=>h.code)])].forEach(c=>{const d=prices[c],s=findS(c);if(d&&d.changeRate<=-5)a.push(`${s?.name||c} ${d.changeRate}% 급락`);});store.holdings.forEach(h=>{const d=prices[h.code],s=findS(h.code);if(h.target&&d&&d.price>=h.target)a.push(`${s?.name||h.code} 목표가 도달!`);});const b=document.getElementById('ab');if(a.length){document.getElementById('at').textContent=a.join(' · ');b.classList.add('on');}else b.classList.remove('on');}
function renderW(){chkA();const el=document.getElementById('wL');if(!store.watchlist.length){el.innerHTML=mkE('⭐','관심종목이 없습니다','검색창에서 종목을 추가해보세요');return;}el.innerHTML=store.watchlist.map(c=>{const s=findS(c);return s?mkWC(s,prices[c]):''}).join('');}
async function addW(code,name,market){if(store.watchlist.includes(code)){closeDD();return;}if(!findS(code))custom[code]={name:name||code,market:market||'KOSPI'};store.watchlist.push(code);renderW();fbSave();const d=await fetchP(code,market||'KOSPI');if(d)prices[code]=d;renderW();closeDD();}
async function rmW(code){store.watchlist=store.watchlist.filter(c=>c!==code);fbSave();renderW();}
function calcH(h){const lots=h.lots||[{buyPrice:h.buyPrice,qty:h.qty}];const qty=lots.reduce((s,l)=>s+l.qty,0);const inv=lots.reduce((s,l)=>s+l.buyPrice*l.qty,0);return{lots,qty,inv,avg:inv/qty};}
function renderH(){let ti=0,te=0;store.holdings.forEach(h=>{const d=prices[h.code];const{qty,inv,avg}=calcH(h);ti+=inv;te+=(d?d.price:avg)*qty;});const tp=te-ti,tr=ti>0?((tp/ti)*100).toFixed(2):0,has=store.holdings.length>0;document.getElementById('tEv').textContent=has?fN(te)+'원':'-';document.getElementById('tIn').textContent=has?fN(ti)+'원':'-';const pe=document.getElementById('tPf');pe.textContent=has?(tp>=0?'+':'')+fN(tp)+'원':'-';pe.className='sc-v '+(tp>=0?'up':'dn');document.getElementById('tRt').textContent=has?(tr>=0?'+':'')+tr+'%':'-';const el=document.getElementById('hL');if(!store.holdings.length){el.innerHTML=mkE('💼','보유종목이 없습니다','검색창에서 종목을 추가해보세요');return;}el.innerHTML=store.holdings.map(h=>{const s=findS(h.code);return s?mkHC(s,prices[h.code],h):''}).join('');}
function openModal(code,name,market){pendCode=code;if(!findS(code)&&name)custom[code]={name,market:market||'KOSPI'};const s=findS(code);document.getElementById('mSub').textContent=(s?.name||name||code)+' ('+code+') — 매수 추가';document.getElementById('mB').value='';document.getElementById('mQ').value='';const ex=store.holdings.find(h=>h.code===code);document.getElementById('mT').value=ex?.target||'';document.getElementById('modal').classList.add('on');closeDD();}
function closeModal(){document.getElementById('modal').classList.remove('on');pendCode=null;}
async function confirmH(){const buy=parseFloat(document.getElementById('mB').value),qty=parseInt(document.getElementById('mQ').value),target=parseFloat(document.getElementById('mT').value)||null;if(!buy||!qty||buy<=0||qty<=0){alert('매입가와 수량을 입력해주세요');return;}const idx=store.holdings.findIndex(h=>h.code===pendCode);if(idx>=0){if(!store.holdings[idx].lots)store.holdings[idx].lots=[{buyPrice:store.holdings[idx].buyPrice,qty:store.holdings[idx].qty}];store.holdings[idx].lots.push({buyPrice:buy,qty});if(target!==null)store.holdings[idx].target=target;}else{store.holdings.push({code:pendCode,lots:[{buyPrice:buy,qty}],target});}renderH();fbSave();closeModal();const s=findS(pendCode);if(s){const d=await fetchP(s.code,s.market);if(d)prices[s.code]=d;renderH();}}
async function rmLot(code,i){const hi=store.holdings.findIndex(h=>h.code===code);if(hi<0)return;store.holdings[hi].lots.splice(i,1);if(!store.holdings[hi].lots.length)store.holdings.splice(hi,1);fbSave();renderH();}
async function rmH(code){if(!confirm((findS(code)?.name||code)+' 전체 삭제?'))return;store.holdings=store.holdings.filter(h=>h.code!==code);fbSave();renderH();}
function mkWC(s,d){const u=s.market==='US',up=d&&d.changeRate>=0,cls=d?(up?'up':'dn'):'nt',isW=d&&d.changeRate<=-5,nav='https://finance.naver.com/item/main.naver?code='+s.code,did='dd-'+s.code;const det=d?`<div class="cdet" id="${did}"><div class="di"><div class="dlbl">시가</div><div class="dval">${fP(d.open,u)}</div></div><div class="di"><div class="dlbl">고가</div><div class="dval up">${fP(d.high,u)}</div></div><div class="di"><div class="dlbl">저가</div><div class="dval dn">${fP(d.low,u)}</div></div><div class="di"><div class="dlbl">거래량</div><div class="dval">${fV(d.volume)}</div></div></div>`:'';const bc=u?'bus':s.market==='KOSPI'?'bkp':'bkq';return`<div class="scard${isW?' warn':''}" draggable="true" data-code="${s.code}" ondragstart="dragStart(event,'${s.code}')" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dragDrop(event,'${s.code}')" ontouchstart="touchStart(event,'${s.code}')" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)" onclick="toggleD('${did}')"><div class="ct"><div class="cico">${s.name[0]}</div><div class="cnm"><div class="cname">${isW?'⚠️ ':''}${s.name}</div><div class="cmeta">${s.code} · <span class="badge ${bc}">${s.market}</span></div></div><div class="cpw"><div class="cprice${isW?' wt':''}">${d?fP(d.price,u):'--'}</div><div class="cchg ${cls}">${d?fC(d.change,d.changeRate,u):'-'}</div></div></div><div class="aisumm" id="ai-${s.code}"></div><div class="cact"><a class="nbtn" href="${nav}" target="_blank" onclick="event.stopPropagation()">N 네이버</a><button class="cbtn" onclick="event.stopPropagation();doAI('${s.code}')">AI요약</button><button class="cbtn red" onclick="event.stopPropagation();rmW('${s.code}')">삭제</button></div>${det}</div>`;}
function mkHC(s,d,h){const u=s.market==='US',{lots,qty,inv,avg}=calcH(h),cur=d?d.price:avg,ev=cur*qty,pf=ev-inv,rt=((pf/inv)*100).toFixed(2),up=pf>=0,cls=up?'up':'dn',nav='https://finance.naver.com/item/main.naver?code='+s.code,lid='lots-'+s.code,isW=d&&d.changeRate<=-5,isTgt=h.target&&d&&d.price>=h.target;const lH=lots.map((l,i)=>{const lp=d?(d.price-l.buyPrice)*l.qty:0,lr=((lp/(l.buyPrice*l.qty))*100).toFixed(1);return`<div class="lot-item"><div class="lot-i">${l.qty}주 @ ${fP(l.buyPrice,u)}</div><div class="lot-r">${d?`<span class="lot-p ${lp>=0?'up':'dn'}">${lp>=0?'+':''}${u?'$'+Math.abs(lp).toFixed(2):fN(Math.abs(lp))+'원'} (${lp>=0?'+':''}${lr}%)</span>`:''}<button class="cbtn red" onclick="event.stopPropagation();rmLot('${s.code}',${i})">삭제</button></div></div>`;}).join('');return`<div class="scard${isTgt?' tgt':isW?' warn':''}" onclick="toggleL('${lid}')"><div class="ct"><div class="cico">${s.name[0]}</div><div class="cnm"><div class="cname">${isTgt?'🎯 ':''}${s.name}</div><div class="cmeta">${s.code} · 총 ${qty}주 · 평균 ${fP(Math.round(avg),u)}${h.target?` · 목표 ${fP(h.target,u)}`:''}</div></div><div class="cpw"><div class="cprice">${fP(ev,u)}</div><div class="cchg ${cls}">${up?'+':''}${u?'$'+Math.abs(pf).toFixed(2):fN(Math.abs(pf))+'원'} (${up?'+':''}${rt}%)</div>${d?`<div class="cchg ${d.changeRate>=0?'up':'dn'}">${d.changeRate>=0?'▲':'▼'} ${Math.abs(d.changeRate)}%</div>`:''}</div></div><div class="cact"><a class="nbtn" href="${nav}" target="_blank" onclick="event.stopPropagation()">N 네이버</a><button class="cbtn" onclick="event.stopPropagation();openModal('${s.code}')">+ 매수추가</button><button class="cbtn red" onclick="event.stopPropagation();rmH('${s.code}')">전체삭제</button></div><div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:6px"><div class="di"><div class="dlbl">현재가</div><div class="dval">${fP(cur,u)}</div></div><div class="di"><div class="dlbl">평가금액</div><div class="dval">${fP(ev,u)}</div></div><div class="di"><div class="dlbl">매입금액</div><div class="dval">${fP(inv,u)}</div></div><div class="di"><div class="dlbl">수익률</div><div class="dval ${cls}">${up?'+':''}${rt}%</div></div></div><div class="lots" id="${lid}"><div class="lot-hd">📋 매수 내역 (${lots.length}건)</div>${lH}</div></div>`;}
function toggleD(id){const e=document.getElementById(id);if(e)e.classList.toggle('on');}

// ── 터치/드래그 순서 변경 ──
let dragSrc=null,touchDragEl=null,touchClone=null;

function dragStart(e,code){
  dragSrc=code;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('dragover');}
function dragLeave(e){e.currentTarget.classList.remove('dragover');}
async function dragDrop(e,targetCode){
  e.preventDefault();
  document.querySelectorAll('.scard').forEach(el=>el.classList.remove('dragover','dragging'));
  if(!dragSrc||dragSrc===targetCode)return;
  await reorder(dragSrc,targetCode);
  dragSrc=null;
}

// 터치 이벤트
function touchStart(e,code){
  dragSrc=code;
  touchDragEl=e.currentTarget;
  touchDragEl.classList.add('dragging');
}
function touchMove(e){
  e.preventDefault();
  const touch=e.touches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const card=el?.closest('.scard[data-code]');
  document.querySelectorAll('.scard.dragover').forEach(c=>c.classList.remove('dragover'));
  if(card&&card.dataset.code!==dragSrc) card.classList.add('dragover');
}
async function touchEnd(e){
  const touch=e.changedTouches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const card=el?.closest('.scard[data-code]');
  document.querySelectorAll('.scard').forEach(c=>c.classList.remove('dragging','dragover'));
  if(card&&card.dataset.code&&card.dataset.code!==dragSrc){
    await reorder(dragSrc,card.dataset.code);
  }
  dragSrc=null;
}

async function reorder(fromCode,toCode){
  const list=store.watchlist;
  const fi=list.indexOf(fromCode),ti=list.indexOf(toCode);
  if(fi<0||ti<0)return;
  list.splice(fi,1);list.splice(ti,0,fromCode);
  renderW();await fbStore();
}
function toggleL(id){const e=document.getElementById(id);if(e)e.classList.toggle('on');}
async function doAI(code){
  const el=document.getElementById('ai-'+code);
  if(!el)return;
  el.classList.add('show');
  if(sums[code]){el.textContent='🤖 '+sums[code];return;}
  el.textContent='🤖 분석 중...';
  const s=findS(code),d=prices[code];
  try{
    const r=await fetch('/api/stock',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'summary',code,name:s?.name||code,price:d?.price||0,changeRate:d?.changeRate||0})
    });
    const data=await r.json();
    const txt=data.result;
    if(txt){sums[code]=txt;el.textContent='🤖 '+txt;}
    else el.textContent='🤖 Gemini 할당량 초과. 잠시 후 시도해주세요';
  }catch(e){
    el.textContent='🤖 서버 오류. 잠시 후 시도해주세요';
  }
}
function onSrc(q,ddId,type){
  clearTimeout(sTimer);
  const dd=document.getElementById(ddId);
  if(!q.trim()){dd.classList.remove('on');return;}
  const isH=type==='H';
  // 로컬 검색 먼저
  const local=[...KR,...US].filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||s.code.toLowerCase().includes(q.toLowerCase())).slice(0,5);
  // 6자리 코드 직접 입력
  if(/^\d{5,6}$/.test(q.trim())){
    const c=q.trim().padStart(6,'0');
    dd.innerHTML=[{code:c,name:c+' (KOSPI)',market:'KOSPI'},{code:c,name:c+' (KOSDAQ)',market:'KOSDAQ'}].map(s=>mkDI(s,isH)).join('');
    dd.classList.add('on');return;
  }
  if(local.length){
    dd.innerHTML=local.map(s=>mkDI(s,isH)).join('')+'<div class="shint">🔍 전체 검색 중...</div>';
    dd.classList.add('on');
  } else {
    dd.innerHTML='<div class="shint">🔍 검색 중...</div>';
    dd.classList.add('on');
  }
  sTimer=setTimeout(()=>yahooSearch(q,ddId,isH,local),400);
}

async function yahooSearch(q,ddId,isH,local){
  const dd=document.getElementById(ddId);
  try {
    // Yahoo Finance 검색을 allorigins 프록시로 호출
    const yahooUrl='https://query1.finance.yahoo.com/v1/finance/search?q='+encodeURIComponent(q)+'&lang=ko-KR&region=KR&quotesCount=10&newsCount=0';
    const proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(yahooUrl);
    const r=await fetch(proxyUrl,{cache:'no-store'});
    const outer=await r.json();
    const data=JSON.parse(outer.contents);
    const quotes=data?.finance?.result?.[0]?.quotes||[];
    const results=[];
    for(const q2 of quotes){
      if(!q2.symbol)continue;
      if(q2.symbol.endsWith('.KS'))results.push({code:q2.symbol.replace('.KS',''),name:q2.shortname||q2.longname||q2.symbol,market:'KOSPI'});
      else if(q2.symbol.endsWith('.KQ'))results.push({code:q2.symbol.replace('.KQ',''),name:q2.shortname||q2.longname||q2.symbol,market:'KOSDAQ'});
      else if(!q2.symbol.includes('.')&&(q2.quoteType==='EQUITY'||q2.quoteType==='ETF'))results.push({code:q2.symbol,name:q2.shortname||q2.longname||q2.symbol,market:'US'});
    }
    if(results.length){
      dd.innerHTML=results.map(s=>mkDI(s,isH)).join('');
      dd.classList.add('on');
    } else if(!local.length){
      dd.innerHTML='<div class="shint">검색 결과 없음. 코드를 직접 입력해보세요</div>';
    }
  } catch(e){
    if(!local.length)dd.innerHTML='<div class="shint">검색 오류. 코드를 직접 입력해보세요</div>';
  }
}

function mkDI(s,isH){
  const bc=s.market==='US'?'bus':s.market==='KOSPI'?'bkp':'bkq';
  const act=isH?'hold':'watch';
  // 이름에 따옴표 등 특수문자 있을 수 있어서 data 속성으로 전달
  return`<div class="sdi" onclick="ddClick(this)" data-code="${s.code}" data-name="${s.name.replace(/"/g,'&quot;')}" data-market="${s.market}" data-act="${act}">
    <div><div class="sdi-n">${s.name}</div><div class="sdi-m">${s.code} · <span class="badge ${bc}">${s.market}</span></div></div>
    <button class="sbtn">${isH?'+ 추가':'+ 관심'}</button>
  </div>`;
}
function ddClick(el){
  const code=el.dataset.code, name=el.dataset.name, market=el.dataset.market, act=el.dataset.act;
  if(act==='hold') openModal(code,name,market);
  else addW(code,name,market);
}
function closeDD(){document.querySelectorAll('.sdd').forEach(d=>d.classList.remove('on'));document.getElementById('wSrc').value='';document.getElementById('hSrc').value='';}
document.addEventListener('click',e=>{if(!e.target.closest('.swrap'))closeDD();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
async function doNews(){
  const q=document.getElementById('nIn').value.trim();
  if(!q)return;
  const el=document.getElementById('nL');
  el.innerHTML='<div class="loading"><div class="spin">⟳</div><div>AI가 분석 중...</div></div>';
  try{
    const r=await fetch('/api/stock',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'news',query:q})
    });
    const data=await r.json();
    const txt=data.result;
    if(!txt) throw new Error('Gemini 응답 없음');
    const clean=txt.replace(/```json|```/g,'').trim();
    const mArr=clean.match(/\[[\s\S]*\]/);
    if(!mArr) throw new Error('JSON 파싱 실패');
    const news=JSON.parse(mArr[0]);
    el.innerHTML=news.map(n=>`<div class="nc ${n.sentiment==='positive'?'pos':n.sentiment==='negative'?'neg':'neu'}">
      <div class="nhdr"><div class="nttl">${n.title}</div>
      <span class="nbdg ${n.sentiment==='positive'?'pos':n.sentiment==='negative'?'neg':'neu'}">${n.sentiment==='positive'?'호재 ✅':n.sentiment==='negative'?'악재 ❌':'중립 ➖'}</span></div>
      <div class="nsum">${n.summary}</div>
      <div class="nimp">📊 ${n.impact}</div>
      <div class="ntm">🕐 ${n.time}</div>
    </div>`).join('');
  }catch(e){
    console.error('News error:',e);
    el.innerHTML=mkE('⚠️','분석 오류','잠시 후 다시 시도해주세요');
  }
}
function goTab(n){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['W','H','N'][i]===n));['W','H','N'].forEach(id=>document.getElementById('p'+id).classList.toggle('on',id===n));}
function toggleMini(){isMini=!isMini;document.body.classList.toggle('mini',isMini);const b=document.getElementById('mbtn');b.textContent=isMini?'🔳 전체':'🔲 미니';b.classList.toggle('mon',isMini);}
function mkE(i,t,s){return`<div class="empty"><div class="ei">${i}</div><div class="et">${t}</div><div class="es">${s}</div></div>`;}
window.addEventListener('fbReady',async()=>{const s=loadS();if(s){try{const d=await fbL(s);if(d&&d.pw)enter(s,d);else clearS();}catch{clearS();}}});
</script>
